<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>곱셈 게임 - 스마트보드 에디션</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts: Outfit, Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 공통 상단 헤더 바 (OS 시스템 바 형태) -->
  <header id="app-header">
    <div class="header-left">
      <button type="button" class="header-btn hidden" id="btn-header-home" title="처음 화면으로">🏠 홈</button>
      <button type="button" class="header-btn hidden" id="btn-header-back" title="이전 화면으로">↩ 뒤로</button>
    </div>
    <div class="header-center">
      <span id="header-status-text">MULTIPLAYER DUEL</span>
    </div>
    <div class="header-right">
      <button type="button" class="header-btn" id="btn-header-compat" title="호환 모드 전환">⚡ 호환: 자동</button>
      <button type="button" class="header-btn" id="btn-header-sound" title="효과음 켜기/끄기">🔊 Sound</button>
      <button type="button" class="header-btn" id="btn-header-fullscreen" title="전체화면 토글">🖥️ 전체화면</button>
    </div>
  </header>

  <!-- 메인 게임 컨테이너 (스크롤 방지 고정 뷰포트) -->
  <div id="app-container">

    <!-- 1. 로비 / 설정 화면 -->
    <section id="lobby-screen" class="screen active">
      <div class="lobby-card">
        <h1 class="game-title">🎯 곱셈 배틀</h1>
        <p class="game-subtitle">Smartboard Multiplayer Multiplication Duel</p>

        <!-- 사용자 프로필 타이틀 & 교사 설정 진입점 -->
        <div class="user-setup-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; width: 100%; padding: 0 4px;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <span class="setup-label-main" style="font-size: 0.88rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 0;">👥 플레이어 프로필 선택</span>
            <label class="profile-mode-switch-wrapper" style="display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none;">
              <input type="checkbox" id="profile-record-toggle" style="accent-color: var(--p1-color); cursor: pointer; width: 15px; height: 15px; margin: 0;">
              <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted);">기록 저장하기</span>
            </label>
          </div>
          <button type="button" class="text-link-btn" id="btn-teacher-setup" style="font-size: 0.78rem; font-weight: 700; color: var(--p1-color); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: background-color 0.2s;">⚙️ 교사 설정</button>
        </div>

        <!-- 1-2) 사용자별 프로필 설정 영역 (넓은 가로 공간에 동적 주입) -->
        <div id="user-setup-container">
          <!-- 동적으로 사용자 1~4 칩 설정 카드가 렌더링됨 -->
        </div>

        <div class="lobby-grid">
          <!-- 왼쪽 열: 핵심 설정 -->
          <div class="setup-group">
            <!-- 1) 게임 인원 선택 -->
            <div class="setup-item full-width">
              <label class="setup-label">👥 게임 인원</label>
              <div class="player-selector">
                <button type="button" class="select-btn active" data-players="1">1인</button>
                <button type="button" class="select-btn" data-players="2">2인</button>
                <button type="button" class="select-btn" data-players="3">3인</button>
                <button type="button" class="select-btn" data-players="4">4인</button>
              </div>
            </div>

            <!-- 3) 게임 모드 선택 (시간 제한 vs 서바이벌) -->
            <div class="setup-item full-width">
              <label class="setup-label">⚡ 게임 모드</label>
              <div class="mode-selector">
                <button type="button" class="select-btn active" data-mode="timeattack">⏱️ 시간 제한 (점수 경쟁)</button>
                <button type="button" class="select-btn" data-mode="survival">💀 서바이벌 (오답/시간초과 탈락)</button>
              </div>
            </div>

            <!-- 4) 게임 시간 선택 -->
            <div class="setup-item full-width" id="time-setup-item">
              <label class="setup-label">⏱️ 제한 시간</label>
              <div class="time-selector">
                <button type="button" class="select-btn active" data-time="60">1분</button>
                <button type="button" class="select-btn" data-time="120">2분</button>
                <button type="button" class="select-btn" data-time="180">3분</button>
                <button type="button" class="select-btn" data-time="300">5분</button>
                <button type="button" class="select-btn" data-time="600">10분</button>
              </div>
            </div>

            <!-- 5) 토글 제어 행 (오답 클리닉 & 사운드 가로 배치 그리드) -->
            <div class="toggle-row-grid full-width">
              <!-- 5-1) 1인 전용 약점 집중 학습 모드 -->
              <div class="setup-item" id="weakness-mode-setup" style="display: none;">
                <label class="setup-label">🏥 오답 클리닉</label>
                <div class="weakness-toggle-wrapper">
                  <label class="switch">
                    <input type="checkbox" id="weakness-focused-toggle">
                    <span class="slider round"></span>
                  </label>
                  <span class="weakness-toggle-desc">약점 우선 출제</span>
                </div>
              </div>

              <!-- 5-2) 사운드 효과음 설정 -->
              <div class="setup-item sound-setting">
                <label class="setup-label">🎵 효과음</label>
                <label class="switch">
                  <input type="checkbox" id="sound-toggle" checked>
                  <span class="slider round"></span>
                </label>
              </div>
            </div>
          </div>

          <!-- 오른쪽 열: 상세 단수 및 유틸리티 설정 -->
          <div class="detail-setup-group">
            <!-- 2) 게임 종류 선택 (구구단 vs 19단) - 콤팩트 가로 배치 -->
            <div class="game-category-compact-row">
              <span class="setup-label">🎯 게임 종류</span>
              <div class="range-selector-compact">
                <button type="button" class="select-btn active" id="btn-gugudan" data-type="gugudan">구구단 (2~9단)</button>
                <button type="button" class="select-btn" id="btn-19dan" data-type="19dan">19단 (2~19단)</button>
              </div>
            </div>
            <div class="dan-section">
              <div class="setup-label-wrapper">
                <span class="setup-label">🔢 출제 단수 설정</span>
                <div class="range-actions">
                  <button type="button" class="text-link-btn" id="btn-select-all">전체 선택</button>
                  <button type="button" class="text-link-btn" id="btn-deselect-all">전체 해제</button>
                </div>
              </div>
              <div class="dan-checkbox-grid" id="dan-container">
                <!-- JS에서 동적으로 채워짐 -->
              </div>
            </div>
          </div>
        </div>

        <button type="button" id="start-game-btn" class="action-btn-neon">
          게임 시작 <span class="arrow">➔</span>
        </button>
      </div>
    </section>


    <!-- 2. 게임 플레이 화면 -->
    <section id="game-screen" class="screen">
      <!-- 동적 플레이어 화면 분할 영역 -->
      <div id="game-grid" class="players-grid-1">
        <!-- JS에서 플레이어 인원수에 따라 분할된 Column(.player-column)을 주입함 -->
      </div>
      <!-- 3초 카운트다운 오버레이 -->
      <div id="countdown-overlay" class="countdown-overlay" style="display: none;">
        <span id="countdown-number">3</span>
      </div>
    </section>


    <!-- 3. 결과 및 리포트 화면 -->
    <section id="result-screen" class="screen">
      <div class="result-dashboard-wrapper">
        <h1 class="global-result-title glow-text-yellow">🏆 경기 결과</h1>

        <!-- 동적 결과 분할 영역 (게임 화면과 동일하게 세로 열로 분할되어 동시 제공) -->
        <div id="result-grid" class="players-grid-1">
          <!-- JS에서 각 사용자별 결과 카드 및 히트맵을 주입함 -->
        </div>

        <div class="result-actions-bar">
          <button type="button" id="lobby-btn" class="action-btn-outline">로비 화면으로</button>
          <button type="button" id="restart-btn" class="action-btn-neon">동일 설정 재경기</button>
        </div>
      </div>
    </section>

  </div>

  <!-- 저작권 은은하게 항시 노출 -->
  <div class="footer-copyright">© 핑키네</div>

  <!-- 재경기 플레이어 확인 모달 -->
  <div id="restart-modal-overlay" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title-icon">🔄</span>
        <div>
          <span class="modal-title-text" id="modal-title-text">재경기 전 플레이어 확인</span>
          <p class="modal-desc">저장된 프로필 데이터가 섞이지 않도록 각 플레이어를 확인해주세요.<br>해제하면 해당 자리는 익명으로 시작합니다.</p>
        </div>
      </div>
      <div id="restart-player-list" class="restart-player-list">
        <!-- JS에서 플레이어 수만큼 행 동적 생성 -->
      </div>
      <div class="modal-actions">
        <button type="button" id="modal-cancel-btn" class="action-btn-outline">취소</button>
        <button type="button" id="modal-confirm-btn" class="action-btn-neon">확인 후 재경기 <span class="arrow">➔</span></button>
      </div>
    </div>
  </div>

  <!-- 교사 설정 모달 -->
  <div id="teacher-modal-overlay" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="teacher-modal-title">
    <div class="modal-card" style="max-width: 500px; display: flex; flex-direction: column;">
      <div class="modal-header">
        <span class="modal-title-icon">⚙️</span>
        <div>
          <span class="modal-title-text" id="teacher-modal-title">교사 설정 (사용자 관리)</span>
          <p class="modal-desc">등록된 모든 사용자의 이름을 수정하거나 삭제할 수 있습니다.</p>
        </div>
      </div>
      <div class="teacher-user-list-wrapper" style="flex: 1; overflow-y: auto; margin: 15px 0; max-height: 40vh; padding-right: 5px;">
        <div id="teacher-user-list" class="teacher-user-list" style="display: flex; flex-direction: column; gap: 8px;">
          <!-- JS에서 사용자 목록 행 동적 생성 -->
        </div>
      </div>
      <div class="modal-actions" style="margin-top: auto;">
        <button type="button" id="teacher-modal-close-btn" class="action-btn-neon" style="width: 100%;">닫기</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
